name: Build and Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: 安装依赖
      run: npm install

    - name: 打包 Windows 应用
      env:
        # 注入 GitHub 内置 Token，彻底解决 GH_TOKEN 缺失问题
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npm run build:win -- --publish never

    - name: 上传打包产物
      uses: actions/upload-artifact@v4
      with:
        name: NewsIntel-Windows
        path: dist/*.exe
